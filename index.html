<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Japanese Study Player</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="episode-panel">
      <div class="episode-panel-header">
        <div class="episode-panel-heading">
          <div class="panel-title">Library</div>
          <div id="episode-summary" class="episode-summary">Showing 1-10 of 10</div>
        </div>
        <button id="episode-panel-toggle" class="episode-panel-toggle" type="button" aria-expanded="false">
          Episodes
        </button>
      </div>
      <div class="episode-filters" aria-label="Media filters">
        <button id="filter-all" class="filter-button active" type="button">All</button>
        <button id="filter-audio" class="filter-button" type="button">Audio</button>
        <button id="filter-video" class="filter-button" type="button">Video</button>
      </div>
      <div id="episode-list" class="episode-list"></div>
      <div class="episode-pagination">
        <button id="page-prev" class="page-button page-arrow" type="button" aria-label="Previous page">‹</button>
        <div id="page-label" class="page-label">1 / 1</div>
        <button id="page-next" class="page-button page-arrow" type="button" aria-label="Next page">›</button>
      </div>
    </aside>

    <main class="player-panel">
      <header class="player-header">
        <div>
          <div id="series-label" class="eyebrow">Japanese Study Player</div>
          <h1 id="episode-title">Loading…</h1>
          <a id="source-link" class="source-link" href="https://nihongoconteppei.com/" target="_blank" rel="noreferrer">Open source page</a>
        </div>
        <div class="player-controls">
          <button id="auto-next-toggle" class="toggle-button" type="button">Auto next: OFF</button>
          <button id="furigana-toggle" class="toggle-button" type="button">Furigana: ON</button>
        </div>
      </header>

      <section class="media-card">
        <audio id="audio-player" controls preload="metadata"></audio>
        <video id="video-player" controls preload="metadata" playsinline></video>
        <div id="player-status" class="player-status">Loading episode…</div>
      </section>

      <section id="subtitle-list" class="subtitle-list"></section>
    </main>
  </div>

  <template id="subtitle-row-template">
    <article class="subtitle-row">
      <div class="subtitle-jp-cell">
        <div class="subtitle-ts"></div>
        <div class="subtitle-jp"></div>
      </div>
      <div class="subtitle-trans-cell">
        <div class="subtitle-en"></div>
        <div class="subtitle-zh"></div>
      </div>
    </article>
  </template>

  <script src="./app.js"></script>
</body>
</html>
